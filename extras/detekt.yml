complexity:
  CyclomaticComplexMethod:
    # Parsers (IframeEvent.parse, Ad.handleIframeEvent, Preload.handleResponse)
    # are legitimately branchy; 25 covers them without losing the rule's intent.
    threshold: 25
  LongMethod:
    threshold: 150
  LongParameterList:
    functionThreshold: 10
    constructorThreshold: 10
    ignoreAnnotated:
      - androidx.compose.runtime.Composable
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 20
    thresholdInInterfaces: 20
    thresholdInObjects: 10
    thresholdInEnums: 15
    ignoreDeprecated: false
    ignorePrivate: true
    ignoreOverridden: true

naming:
  FunctionNaming:
    ignoreAnnotated: [ 'Composable' ]
  TopLevelPropertyNaming:
    active: false
  EnumNaming:
    active: false
  MatchingDeclarationName:
    # Some files are named after the package concept (Configuration.kt
    # holds ResolvedConfig) rather than the single top-level class.
    active: false

style:
  ForbiddenComment:
    active: false
  FunctionOnlyReturningConstant:
    active: false
  LoopWithTooManyJumpStatements:
    active: false
  MagicNumber:
    active: false
  MaxLineLength:
    active: false
  ReturnCount:
    active: false
  SerialVersionUIDInSerializableClass:
    active: false
  ThrowsCount:
    active: false
  UnnecessaryAbstractClass:
    active: false
  UnusedPrivateMember:
    active: false
  # Wildcard imports already allowed at the spotless layer.
  WildcardImport:
    active: false
  # Public modifiers inside internal sealed classes document intent
  # for KDoc / IDE even if the effective visibility is internal.
  NestedClassesVisibility:
    active: false

exceptions:
  # Boundary code (HTTP, JSON parsing, lifecycle callbacks) legitimately
  # catches/throws Exception — narrower types don't add safety here.
  TooGenericExceptionCaught:
    active: false
  TooGenericExceptionThrown:
    active: false

empty-blocks:
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true
